<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Datang di Hotspot Toni Alfarizi</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Tema Maung: dominan hitam & kuning */
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #ffd700;
            margin: 0;
            padding: 0;
        }

        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .wrap {
            background: #222;
            border: 3px solid #ffd700;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
        }

        .wrap input[type="text"],
        .wrap input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ffd700;
            border-radius: 5px;
            background: #111;
            color: #ffd700;
        }

        .wrap input[type="submit"] {
            background: #ffd700;
            color: #111;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .wrap input[type="submit"]:hover {
            background: #e6c200;
        }

        .info {
            margin-bottom: 15px;
        }

        .ico {
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>
</head>

<body>

    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>

    <script src="/md5.js"></script>
    <script>
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }
    </script>
    $(endif)

    <div class="main">
        <div class="wrap">
            <h2>Selamat Datang di Hotspot Toni Alfarizi</h2>
            <form name="login" action="$(link-login-only)" method="post" $(if chap-id) onSubmit="return doLogin()" $(endif)>
                <input type="hidden" name="dst" value="$(link-orig)" />
                <input type="hidden" name="popup" value="true" />

                <p class="info $(if error)alert$(endif)">
                    $(if error == "")Silakan login untuk menggunakan layanan hotspot $(if trial == 'yes')<br />Free trial tersedia, <a href="$(link-login-only)?dst=$(link-orig-esc)&amp;username=T-$(mac-esc)">klik di sini</a>.$(endif)
                    $(endif)
                    $(if error)$(error)$(endif)
                </p>

                <label>
                    <img class="ico" src="img/user.svg" alt="User" />
                    <input name="username" type="text" value="$(username)" placeholder="Username" />
                </label>

                <label>
                    <img class="ico" src="img/password.svg" alt="Password" />
                    <input name="password" type="password" placeholder="Password" />
                </label>

                <input type="submit" value="Connect" />
            </form>

            <p class="info bt">Powered by MikroTik RouterOS</p>
        </div>
    </div>

</body>

</html>
